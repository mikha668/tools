<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lucky draw</title>
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#0f1b33;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent: #7c5cff;
      --accent2:#2bd4ff;
      --danger:#ff4d6d;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(900px 450px at 20% 20%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(800px 380px at 80% 35%, rgba(43,212,255,.25), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      padding:24px;
    }

    .wrap{
      width:min(1200px, 100%);
      display:grid;
      gap:14px;
    }

    header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }

    h1{
      margin:0;
      font-size: clamp(18px, 2.5vw, 24px);
      letter-spacing:.2px;
    }
    .sub{
      margin:0;
      color:var(--muted);
      font-size: 13px;
      line-height:1.35;
      text-align:right;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:14px;
    }

    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .sub{ text-align:left; }
    }

    .card{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .section-title{
      font-weight:800;
      letter-spacing:.2px;
      margin: 0 0 10px;
    }

    textarea{
      width:100%;
      min-height: 170px;
      resize: vertical;
      border-radius: 16px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 12px 12px;
      outline: none;
      line-height: 1.35;
    }
    textarea::placeholder{ color: rgba(255,255,255,.45); }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top: 10px;
    }

    input[type="text"]{
      flex: 1 1 240px;
      border-radius: 14px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 10px 12px;
      outline:none;
    }

    button{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 800;
      letter-spacing:.2px;
      transition: transform .05s ease, background .2s ease, border-color .2s ease;
      user-select:none;
    }
    button:active{ transform: translateY(1px); }
    button.primary{
      background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(43,212,255,.60));
      border-color: rgba(255,255,255,.10);
    }
    button.danger{
      background: rgba(255,77,109,.12);
      border-color: rgba(255,77,109,.35);
    }
    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top: 10px;
    }
    .chip{
      display:flex;
      align-items:center;
      gap:8px;
      padding: 7px 10px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      font-size: 13px;
      max-width: 100%;
    }
    .chip .name{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width: 280px;
    }
    .chip button{
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 900;
      min-width: unset;
    }

    .meta{
      margin-top: 10px;
      color: var(--muted);
      font-size: 12.5px;
    }

    /* Right side wheel */
    .wheelWrap{
      display:grid;
      place-items:center;
      gap:12px;
    }
    .wheelCard{
      width:min(560px, 95vw);
      display:grid;
      gap:12px;
      justify-items:center;
    }

    .canvasBox{
      width: min(520px, 92vw);
      aspect-ratio: 1 / 1;
      position: relative;
      border-radius: 22px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      overflow:hidden;
      display:grid;
      place-items:center;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
    }

    .pointer{
      position:absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 22px solid rgba(255,255,255,.92);
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.35));
      opacity: .95;
    }

    .controls{
      width: min(520px, 92vw);
      display:grid;
      gap: 10px;
      margin-top: 2px;
    }

    .pill{
      display:flex;
      gap:10px;
      align-items:center;
      width:100%;
      padding: 10px 12px;
      border:1px solid var(--stroke);
      border-radius: 16px;
      background: rgba(255,255,255,.04);
    }

    label{
      color: var(--muted);
      font-size: 13px;
      user-select:none;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    input[type="range"]{
      width:100%;
      accent-color: var(--accent);
    }
    .value{
      min-width: 90px;
      text-align:right;
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      color: rgba(255,255,255,.86);
      white-space: nowrap;
    }

    .btnRow{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .winners{
      width: min(520px, 92vw);
      display:grid;
      gap:10px;
      margin-top: 6px;
    }

    .winnerLine{
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      padding: 10px 12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size: 13.5px;
    }
    .winnerLine b{ letter-spacing:.2px; }
    .badge{
      padding: 2px 8px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(124,92,255,.18);
      color: rgba(255,255,255,.88);
      font-size: 12px;
      white-space:nowrap;
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(10,15,28,.75);
      color: rgba(255,255,255,.90);
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
      font-size: 13px;
      opacity:0;
      pointer-events:none;
      transition: opacity .2s ease;
    }
    .toast.show{ opacity:1; }

    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New";
      font-size: 12px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      padding: 2px 6px;
      border-radius: 8px;
      color: rgba(255,255,255,.78);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Lucky Draw</h1>
      </div>

    </header>

    <div class="grid">
      <!-- Left: input & list -->
      <section class="card">
        <div class="section-title">Participants</div>

        <textarea id="paste"
          placeholder='Paste here (e.g. from Outlook/Teams):
"Anna Olsson" <anna.olsson@mail.com>; "Bertil Svensson" <bertil.svensson@mail.com>
or:
anna.andersson@company.com; bertil_svensson@company.com
or:
Anna Andersson
Bertil Svensson'></textarea>

        <div class="row">
          <button type="button" class="primary" id="parseBtn">Add from text</button>
          <button type="button" class="danger" id="clearTextBtn" title="Only clears text inputs">Clear text</button>
        </div>

        <div class="row">
          <input id="manualName" type="text" placeholder="Type a name and press Enter…" />
          <button type="button" id="addManualBtn">Add name</button>
          <button type="button" class="danger" id="clearPeopleBtn" title="Clears participant list">Clear list</button>
        </div>

        <div class="meta" id="countMeta">0 participants</div>
        <div class="chips" id="chips"></div>
      </section>

      <!-- Right: wheel & draw -->
      <aside class="card wheelWrap">
        <div class="wheelCard">
          <div class="section-title">Draw winners</div>

          <div class="canvasBox">
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="wheel"></canvas>
          </div>

          <div class="controls">
            <label for="prizes">
              <span>Number of prizes (1–10)</span>
              <span class="value"><span id="prizesVal">3</span> total</span>
            </label>

            <div class="pill">
              <input id="prizes" type="range" min="1" max="10" value="3" />
            </div>

            <div class="btnRow">
              <button type="button" class="primary" id="drawBtn">Draw (3 left)</button>
              <button type="button" id="resetDrawBtn">Reset draw</button>
              <button type="button" id="copyWinnersBtn" disabled>Copy winners</button>
            </div>

            <div class="meta" id="drawMeta">Add participants to enable the wheel.</div>
          </div>

          <div class="winners" id="winners"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

<script>
(() => {

  // =========================
  // 🔒 Prevent Enter from triggering actions (except manual name field)
  // =========================
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const manualInput = document.getElementById("manualName");
      const isManualNameField = document.activeElement === manualInput;
      if (!isManualNameField) {
        e.preventDefault();
        e.stopPropagation();
      }
    }
  });

  // ---------- Helpers ----------
  const $ = (id) => document.getElementById(id);

  function toast(msg){
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1200);
  }

  function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

  // Decode basic HTML entities (Outlook paste can contain &lt; &gt; &quot; etc)
  function decodeEntities(s){
    return (s || "")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&quot;/g, "\"")
      .replace(/&#34;/g, "\"")
      .replace(/&amp;/g, "&");
  }

  const emailRegex = /[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/gi;

  function titleCase(s){
    return s.split(" ").filter(Boolean).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
  }

  function normalizeName(s){
    return (s || "")
      .trim()
      .replace(/\s+/g, " ");
  }

  function uniqueKey(s){
    return normalizeName(s).toLowerCase();
  }

  function nameFromEmail(email){
    const local = (email.split("@")[0] || "").trim();
    const cleaned = local.replace(/[._-]+/g, " ").replace(/\s+/g, " ").trim();
    return titleCase(cleaned);
  }

  // Fisher–Yates shuffle (used in a few places)
  function shuffle(arr){
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Pleasant sound (played ONLY on final draw)
  let audioCtx = null;
  function softDing(){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const now = audioCtx.currentTime;

      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc1.type = "triangle";
      osc2.type = "sine";
      osc1.frequency.setValueAtTime(880, now);
      osc2.frequency.setValueAtTime(1320, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.06, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.9);

      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(audioCtx.destination);

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.95);
      osc2.stop(now + 0.95);
    }catch(e){
      // ignore if blocked
    }
  }

  function easeOutCubic(t){
    return 1 - Math.pow(1 - t, 3);
  }

  // ---------- Elements ----------
  const paste = $("paste");
  const parseBtn = $("parseBtn");
  const clearTextBtn = $("clearTextBtn");
  const manualName = $("manualName");
  const addManualBtn = $("addManualBtn");
  const clearPeopleBtn = $("clearPeopleBtn");

  const chips = $("chips");
  const countMeta = $("countMeta");

  const prizes = $("prizes");
  const prizesVal = $("prizesVal");
  const drawBtn = $("drawBtn");
  const resetDrawBtn = $("resetDrawBtn");
  const copyWinnersBtn = $("copyWinnersBtn");
  const drawMeta = $("drawMeta");
  const winnersEl = $("winners");

  const canvas = $("wheel");
  const ctx = canvas.getContext("2d");

  // ---------- State ----------
  const participants = new Map(); // key -> displayName

  // Wheel keeps ALL names visible
  let wheelAll = [];              // all names on the wheel
  let winners = [];               // winners in order
  let winnerKeys = new Set();     // quick lookup for already-won

  let spinning = false;
  let rotation = 0;               // radians
  let targetRotation = 0;

  // ---------- Parsing ----------
  function parseInputText(text){
    const decoded = decodeEntities(text);
    let working = decoded;

    // Outlook patterns:

    const outlookNames = [];
    const matchedEmails = new Set();

    const reQuoted = /"([^"]+)"\s*<\s*([a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,})\s*>/gi;
    const reUnquoted = /(^|[\n,;])\s*([^<"\n;,][^<\n;,{]{1,80}?)\s*<\s*([a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,})\s*>/gi;

    working = working.replace(reQuoted, (m, name, email) => {
      const n = normalizeName(name);
      if (n) outlookNames.push(titleCase(n));
      matchedEmails.add(String(email).toLowerCase());
      return " ";
    });

    working = working.replace(reUnquoted, (m, sep, name, email) => {
      const n = normalizeName(name);
      if (n) outlookNames.push(titleCase(n));
      matchedEmails.add(String(email).toLowerCase());
      return sep ? sep + " " : " ";
    });

    // Emails left in text (not already paired with a name)
    const foundEmails = (working.match(emailRegex) || [])
      .map(e => e.toLowerCase())
      .filter(e => !matchedEmails.has(e));

    const namesFromEmails = foundEmails.map(nameFromEmail).filter(Boolean);

    // Also accept raw line tokens as names
    const rawTokens = working
      .replace(emailRegex, " ")
      .split(/[\n,;]+/g)
      .map(t => t.trim())
      .filter(Boolean)
      .filter(t => t.length >= 2);

    return [...outlookNames, ...namesFromEmails, ...rawTokens];
  }

  function addNames(names){
    let added = 0;
    names.forEach(n => {
      const nn = normalizeName(n);
      if (!nn) return;
      const key = uniqueKey(nn);
      if (!participants.has(key)){
        participants.set(key, nn);
        added++;
      }
    });

    if (added > 0){
      renderParticipants();
      syncWheelFromParticipants({ keepWinners: true });
    }
    return added;
  }

  // ---------- UI: Participants ----------
  function renderParticipants(){
    chips.innerHTML = "";
    const items = Array.from(participants.values());
    countMeta.textContent = `${items.length} participant${items.length === 1 ? "" : "s"}`;

    items.forEach(name => {
      const key = uniqueKey(name);
      const chip = document.createElement("div");
      chip.className = "chip";

      const span = document.createElement("div");
      span.className = "name";
      span.textContent = name;

      const del = document.createElement("button");
      del.type = "button";
      del.className = "danger";
      del.textContent = "×";
      del.title = "Remove";
      del.addEventListener("click", () => {
        participants.delete(key);

        // Remove from winners if present
        winners = winners.filter(w => uniqueKey(w.name) !== key);
        winnerKeys = new Set(winners.map(w => uniqueKey(w.name)))

        renderWinners();
        renderParticipants();
        syncWheelFromParticipants({ keepWinners: true });

        toast("Removed.");
      });

      chip.appendChild(span);
      chip.appendChild(del);
      chips.appendChild(chip);
    });

    // Update slider max based on participant count
    const count = items.length;
    const maxPrizes = clamp(count, 1, 10);
    prizes.max = String(maxPrizes);
    prizes.value = String(clamp(Number(prizes.value), 1, maxPrizes));
    prizesVal.textContent = prizes.value;

    updateDrawUI();
  }

  // ---------- Wheel Drawing ----------
  function resizeCanvas(){
    const box = canvas.parentElement;
    const rect = box.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    drawWheel();
  }

  function colorForIndex(i, n){
    const hue = (i * (360 / Math.max(1, n)) + 260) % 360;
    return `hsla(${hue}, 85%, 60%, 0.85)`;
  }

  function truncateName(name, max=18){
    if (name.length <= max) return name;
    return name.slice(0, max - 1) + "…";
  }

  function drawWheel(){
    const box = canvas.parentElement;
    const w = box.clientWidth;
    const h = box.clientHeight;
    ctx.clearRect(0, 0, w, h);

    const names = wheelAll.length ? wheelAll : ["(add participants)"];
    const n = names.length;

    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(w, h) * 0.44;

    // background vignette
    const g = ctx.createRadialGradient(cx, cy, radius*0.2, cx, cy, radius*1.2);
    g.addColorStop(0, "rgba(255,255,255,0.04)");
    g.addColorStop(1, "rgba(0,0,0,0.20)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, radius*1.08, 0, Math.PI*2);
    ctx.fill();

    const slice = (Math.PI * 2) / n;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);

    for (let i = 0; i < n; i++){
      const start = i * slice;
      const end = start + slice;

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, radius, start, end);
      ctx.closePath();

      const isWinner = wheelAll.length && winnerKeys.has(uniqueKey(names[i]));
      ctx.fillStyle = wheelAll.length
        ? (isWinner ? "rgba(255,255,255,0.10)" : colorForIndex(i, n))
        : "rgba(255,255,255,0.08)";
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // text
      const mid = start + slice / 2;
      ctx.save();
      ctx.rotate(mid);
      ctx.textAlign = "right";

      const isWinnerText = wheelAll.length && winnerKeys.has(uniqueKey(names[i]));
      ctx.fillStyle = isWinnerText ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.92)";
      ctx.font = "700 14px system-ui, -apple-system, Segoe UI, Roboto, Arial";

      const label = isWinnerText ? `✓ ${truncateName(names[i], 16)}` : truncateName(names[i]);
      ctx.fillText(label, radius - 14, 5);
      ctx.restore();
    }

    // center cap
    ctx.beginPath();
    ctx.arc(0, 0, radius*0.18, 0, Math.PI*2);
    ctx.fillStyle = "rgba(0,0,0,0.20)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
  }

  // Determine which slice is at the pointer (top)
  function getIndexAtPointer(){
    const n = wheelAll.length;
    if (!n) return -1;
    const slice = (Math.PI * 2) / n;

    const pointerAngle = -Math.PI / 2;
    let a = pointerAngle - rotation;
    a = ((a % (Math.PI*2)) + (Math.PI*2)) % (Math.PI*2);

    const idx = Math.floor(a / slice);
    return clamp(idx, 0, n - 1);
  }

  // ---------- Wheel / Draw state ----------
  function syncWheelFromParticipants({ keepWinners } = { keepWinners: true }){
    const all = Array.from(participants.values());

    if (!keepWinners){
      winners = [];
      winnerKeys = new Set();
      renderWinners();
    } else {
      winnerKeys = new Set(winners.map(w => uniqueKey(w.name)));
    }

    wheelAll = all;

    const maxPrizes = clamp(all.length, 1, 10);
    prizes.max = String(maxPrizes);
    prizes.value = String(clamp(Number(prizes.value), 1, maxPrizes));
    prizesVal.textContent = prizes.value;

    if (!wheelAll.length) rotation = 0;

    updateDrawUI();
    drawWheel();
  }

  function updateDrawUI(){
    const peopleCount = participants.size;
    const target = Number(prizes.value) || 1;
    const prizesLeft = clamp(target - winners.length, 0, 10);

    const availableCount = wheelAll.filter(n => !winnerKeys.has(uniqueKey(n))).length;

    const canDraw =
      !spinning &&
      peopleCount > 0 &&
      prizesLeft > 0 &&
      availableCount > 0;

    drawBtn.disabled = !canDraw;
    drawBtn.textContent = `Draw (${prizesLeft} left)`;

    if (peopleCount === 0){
      drawMeta.textContent = "Add participants to enable the wheel.";
    } else if (prizesLeft === 0){
      drawMeta.textContent = "Done! All prizes have been drawn. (You can reset the draw.)";
    } else if (availableCount === 0){
      drawMeta.textContent = "No more available names (everyone has won).";
    } else {
      drawMeta.textContent =
        `${peopleCount} participants • ${winners.length} winner${winners.length === 1 ? "" : "s"} • ${prizesLeft} prize${prizesLeft === 1 ? "" : "s"} left • ${availableCount} available`;
    }

    copyWinnersBtn.disabled = winners.length === 0;
    prizesVal.textContent = String(target);
  }

  function renderWinners(){
    winnersEl.innerHTML = "";
    if (!winners.length) return;

    // Show higher prizes first: #1 at the top
    const sorted = winners.slice().sort((a, b) => a.prize - b.prize);

    sorted.forEach((w) => {
      const div = document.createElement("div");
      div.className = "winnerLine";
      div.innerHTML = `<b>Prize #${w.prize}</b><span>${w.name}</span><span class="badge">winner</span>`;
      winnersEl.appendChild(div);
    });
  }


  function pickRandomWinner(){
    if (!wheelAll.length) return null;

    const availableIdx = [];
    for (let i = 0; i < wheelAll.length; i++){
      const k = uniqueKey(wheelAll[i]);
      if (!winnerKeys.has(k)) availableIdx.push(i);
    }
    if (!availableIdx.length) return null;

    const idx = availableIdx[Math.floor(Math.random() * availableIdx.length)];
    return { idx, name: wheelAll[idx] };
  }

  function spinToIndex(targetIdx, durationMs){
    return new Promise((resolve) => {
      const n = wheelAll.length;
      const slice = (Math.PI * 2) / n;

      // Target = center of slice at pointer (top).
      const sliceCenter = (targetIdx + 0.5) * slice;
      const pointerAngle = -Math.PI / 2;

      let desired = pointerAngle - sliceCenter;

      const extraTurns = (durationMs >= 5000) ? 7 : (5 + Math.floor(Math.random() * 3)); // 5–7
      const twoPi = Math.PI * 2;

      const current = rotation;
      let delta = desired - current;
      delta = ((delta % twoPi) + twoPi) % twoPi; // 0..2π forward

      targetRotation = current + extraTurns * twoPi + delta;

      const start = performance.now();
      const startRot = rotation;

      spinning = true;
      updateDrawUI();

      function frame(now){
        const t = clamp((now - start) / durationMs, 0, 1);
        const e = easeOutCubic(t);
        rotation = startRot + (targetRotation - startRot) * e;
        drawWheel();

        if (t < 1){
          requestAnimationFrame(frame);
        } else {
          spinning = false;
          rotation = targetRotation;
          drawWheel();
          updateDrawUI();
          resolve();
        }
      }

      requestAnimationFrame(frame);
    });
  }

  async function drawWinner(){
    if (spinning) return;

    const target = Number(prizes.value) || 1;
    const prizesLeft = target - winners.length;

    if (prizesLeft <= 0){
      toast("All prizes have already been drawn.");
      return;
    }

    const picked = pickRandomWinner();
    if (!picked){
      toast("No available names to draw.");
      return;
    }

    const isFinalDraw = (prizesLeft === 1);
    const duration = isFinalDraw ? 5000 : (2000 + Math.floor(Math.random() * 2001)); // 2000–4000

    await spinToIndex(picked.idx, duration);

    // Prefer where pointer lands, but ensure it is not already a winner
    const pointerIdx = getIndexAtPointer();
    let finalIdx = (pointerIdx >= 0 && wheelAll[pointerIdx]) ? pointerIdx : picked.idx;

    const candidate = wheelAll[finalIdx];
    if (winnerKeys.has(uniqueKey(candidate))){
      finalIdx = picked.idx; // fallback to picked
    }

    //const winnerName = wheelAll[finalIdx];
    //winners.push(winnerName);
    //winnerKeys.add(uniqueKey(winnerName));

    
    const prizeAwarded = prizesLeft; // first draw = N, last draw = 1

    const winnerName = wheelAll[finalIdx];
    winners.push({ name: winnerName, prize: prizeAwarded });
    winnerKeys.add(uniqueKey(winnerName))

    renderWinners();

    // Keep names visible: do NOT remove from wheel, just redraw with winner styling.
    rotation += (Math.random() - 0.5) * 0.08;

    if (isFinalDraw){
      softDing();
      toast(`Final winner: ${winnerName}`);
    } else {
      toast(`Winner: ${winnerName}`);
    }

    updateDrawUI();
    drawWheel();
  }

  function resetDraw(){
    winners = [];
    winnerKeys = new Set();
    renderWinners();
    syncWheelFromParticipants({ keepWinners: false });
    toast("Draw reset.");
  }

  function copyWinners(){
    if (!winners.length){
      toast("No winners yet.");
      return;
    }

    const sorted = winners.slice().sort((a, b) => a.prize - b.prize);
    const txt = sorted.map(w => `Prize #${w.prize}: ${w.name}`).join("\n");

    navigator.clipboard?.writeText(txt)
      .then(() => toast("Winners copied!"))
      .catch(() => {
        const ta = document.createElement("textarea");
        ta.value = txt;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        toast("Copied!");
      });
  }

  // ---------- Events ----------
  parseBtn.addEventListener("click", () => {
    const text = paste.value || "";
    const names = parseInputText(text);
    const added = addNames(names);
    toast(added > 0 ? `Added ${added}.` : "Nothing new to add.");
  });

  clearTextBtn.addEventListener("click", () => {
    paste.value = "";
    manualName.value = "";
    toast("Text cleared.");
  });

  addManualBtn.addEventListener("click", () => {
    const n = manualName.value;
    const added = addNames([n]);
    manualName.value = "";
    toast(added ? "Added." : "Nothing new.");
  });

  manualName.addEventListener("keydown", (e) => {
    if (e.key === "Enter"){
      e.preventDefault();
      addManualBtn.click();
    }
  });

  clearPeopleBtn.addEventListener("click", () => {
    participants.clear();
    winners = [];
    winnerKeys = new Set();
    wheelAll = [];
    renderWinners();
    renderParticipants();
    drawWheel();
    updateDrawUI();
    toast("List cleared.");
  });

  prizes.addEventListener("input", () => {
    prizesVal.textContent = prizes.value;
    // Changing number of prizes resets the draw so the "3 → 2 → 1" behavior stays consistent
    resetDraw();
  });

  drawBtn.addEventListener("click", drawWinner);
  resetDrawBtn.addEventListener("click", resetDraw);
  copyWinnersBtn.addEventListener("click", copyWinners);

  window.addEventListener("resize", resizeCanvas);

  // Init
  renderParticipants();
  syncWheelFromParticipants({ keepWinners: false });
  resizeCanvas();

})();
