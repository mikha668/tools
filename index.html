<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workshop tools</title>
  <style>
    :root{
      --bg1:#0b1220; --bg2:#0f1b33;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent:#7c5cff; --accent2:#2bd4ff;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 450px at 20% 20%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(800px 380px at 80% 35%, rgba(43,212,255,.25), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      padding:24px;
    }
    .card{
      width:min(820px, 100%);
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px;
      backdrop-filter: blur(10px);
    }
    h1{margin:0 0 10px; font-size:22px}
    p{margin:0 0 18px; color:var(--muted)}
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap:12px;
    }
    a.tool{
      display:block;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color:var(--text);
      text-decoration:none;
      transition: transform .06s ease, border-color .2s ease, background .2s ease;
    }
    a.tool:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.22);
      background: rgba(255,255,255,.06);
    }
    .title{font-weight:800; letter-spacing:.2px}
    .desc{color:var(--muted); font-size:13px; margin-top:6px}
    .badge{
      display:inline-block;
      margin-top:10px;
      padding:3px 8px;
      border-radius:999px;
      font-size:12px;
      background: linear-gradient(135deg, rgba(124,92,255,.6), rgba(43,212,255,.35));
      border:1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.88);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Workshop tools</h1>
    <p>Välj verktyg:</p>

    <div class="grid">
      <a class="tool" href="timer.html">
        <div class="title">Timer</div>
        <div class="desc">1–20 minutes, count down</div>
        <span class="badge">workshop</span>
      </a>

      <a class="tool" href="group.html">
        <div class="title">Group</div>
        <div class="desc">Create groups automaticly</div>
        <span class="badge">Preperation</span>
      </a>
    </div>
  </div>
</body>
</html>
