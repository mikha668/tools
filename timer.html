<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Workshop-timer</title>
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#0f1b33;
      --card: rgba(255,255,255,.06);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent: #7c5cff;
      --accent2:#2bd4ff;
      --danger:#ff4d6d;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(900px 450px at 20% 20%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(800px 380px at 80% 35%, rgba(43,212,255,.25), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      padding:24px;
    }

    .card{
      width: min(820px, 100%);
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(10px);
    }

    .display{
      display:grid;
      place-items:center;
      padding: 8px 0 6px;
      gap: 14px;
    }


    /* Timer ring */
    .ring{
      width: 100%;
      max-width: 520px; /* samma som .controls */
      aspect-ratio: 1 / 1;
      position: relative;
      display: grid;
      place-items: center;
      margin: 4px 0 0;
    }
    
    svg{ width:100%; height:100%; transform: rotate(-90deg); }
    .track{ stroke: rgba(255,255,255,.10); }
    .progress{
      stroke: url(#grad);
      filter: drop-shadow(0 8px 18px rgba(124,92,255,.30));
      transition: stroke .25s ease;
    }
    .danger .progress{
      stroke: var(--danger);
      filter: drop-shadow(0 8px 18px rgba(255,77,109,.28));
    }

    .time{
      position:absolute;
      text-align:center;
      transform: translateY(2px);
      user-select:none;
    }
    .time .big{
      font-variant-numeric: tabular-nums;
      font-size: clamp(46px, 7vw, 76px);
      font-weight: 800;
      letter-spacing: .6px;
      line-height: 1;
    }
    .time .sub{
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: .3px;
    }

    /* Controls under timer */
    .controls{
      width: min(520px, 92vw);
      display:grid;
      gap: 12px;
      padding: 6px 4px 2px;
    }

    .pill{
      display:flex;
      align-items:center;
      gap:12px;
      padding: 10px 12px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      border-radius: 16px;
    }
    label{
      font-size: 13px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .mins{
      font-variant-numeric: tabular-nums;
      font-weight:700;
      color: rgba(255,255,255,.85);
      white-space: nowrap;
    }
    input[type="range"]{
      width:100%;
      accent-color: var(--accent);
    }

    .buttons{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    button{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 700;
      letter-spacing:.2px;
      transition: transform .05s ease, background .2s ease, border-color .2s ease;
      user-select:none;
      min-width: 120px;
    }
    button:active{ transform: translateY(1px); }
    button.primary{
      background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(43,212,255,.60));
      border-color: rgba(255,255,255,.10);
    }
    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    /* Finish pulse (visual only) */
    .pulse{
      animation: pulse 1.1s ease-in-out 6; /* pulse a few times, then stop */
    }
    @keyframes pulse{
      0%,100%{ transform: scale(1); }
      50%{ transform: scale(1.03); }
    }

    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New";
      font-size: 12px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      padding: 2px 6px;
      border-radius: 8px;
      color: rgba(255,255,255,.78);
    }

    .shortcuts{
      text-align:center;
      color: rgba(255,255,255,.55);
      font-size: 12px;
      margin-top: 2px;
      user-select:none;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="display" id="displayCard">
      <div class="ring" id="ring">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7c5cff"/>
              <stop offset="100%" stop-color="#2bd4ff"/>
            </linearGradient>
          </defs>

          <circle class="track" cx="60" cy="60" r="52" stroke-width="10" fill="none"></circle>
          <circle class="progress" id="progress"
                  cx="60" cy="60" r="52"
                  stroke-width="10" stroke-linecap="round" fill="none"></circle>
        </svg>

        <div class="time" aria-live="polite">
          <div class="big" id="timeText">10:00</div>
          <div class="sub" id="subText">Redo</div>
        </div>
      </div>

      <div class="controls">
        <label for="minutes">
          <span>Tid (1–20 min)</span>
          <span class="mins"><span id="minutesLabel">10</span> min</span>
        </label>

        <div class="pill">
          <input id="minutes" type="range" min="1" max="20" value="10" />
        </div>

        <div class="buttons">
          <button class="primary" id="startPause">Start</button>
          <button id="reset">Reset</button>
        </div>

        <div class="shortcuts">
          <span class="kbd">Space</span> start/paus • <span class="kbd">R</span> reset
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // --- State ---
  let totalSeconds = 10 * 60;
  let remainingSeconds = totalSeconds;
  let running = false;
  let timerId = null;
  let finished = false;

  // --- Elements ---
  const minutesRange = document.getElementById('minutes');
  const minutesLabel = document.getElementById('minutesLabel');
  const timeText = document.getElementById('timeText');
  const subText = document.getElementById('subText');
  const progress = document.getElementById('progress');
  const startPauseBtn = document.getElementById('startPause');
  const resetBtn = document.getElementById('reset');
  const ring = document.getElementById('ring');
  const displayCard = document.getElementById('displayCard');

  // --- Progress ring setup ---
  const r = 52;
  const circumference = 2 * Math.PI * r;
  progress.style.strokeDasharray = `${circumference} ${circumference}`;

  function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

  function formatMMSS(s){
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function setProgress(pct){
    // pct: 0..1 (1 = full, 0 = empty)
    const offset = circumference * (1 - pct);
    progress.style.strokeDashoffset = offset;
  }

  // --- Audio (single, soft pleasant "ding") ---
  let audioCtx = null;
  function softDing(){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();

      const now = audioCtx.currentTime;

      // Two partials to make it sound "pleasant"
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      // Slightly bell-like (triangle)
      osc1.type = "triangle";
      osc2.type = "sine";

      // A nice interval (A5 + E6-ish)
      osc1.frequency.setValueAtTime(880, now);
      osc2.frequency.setValueAtTime(1320, now);

      // Soft attack, quick decay
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.06, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.9);

      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(audioCtx.destination);

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.95);
      osc2.stop(now + 0.95);
    }catch(e){
      // If audio is blocked, we still finish visually.
    }
  }

  function updateUI(){
    timeText.textContent = formatMMSS(remainingSeconds);

    const pct = totalSeconds > 0 ? remainingSeconds / totalSeconds : 0;
    setProgress(clamp(pct, 0, 1));

    // Last minute visual cue
    const danger = remainingSeconds <= 60 && running;
    ring.classList.toggle('danger', danger);

    if (finished){
      subText.textContent = "Klart!";
    } else if (!running && remainingSeconds === totalSeconds){
      subText.textContent = "Redo";
    } else if (running){
      subText.textContent = remainingSeconds <= 60 ? "Sista minuten!" : "Räknar ner…";
    } else {
      subText.textContent = "Pausad";
    }

    startPauseBtn.textContent = running ? "Paus" : (remainingSeconds === 0 ? "Start om" : "Start");
    resetBtn.disabled = running && remainingSeconds !== totalSeconds;
  }

  function finish(){
    finished = true;
    remainingSeconds = 0;
    stopTimer(true);

    // Visual pulse a few times + one soft ding
    displayCard.classList.remove('pulse');
    void displayCard.offsetWidth; // restart animation
    displayCard.classList.add('pulse');
    softDing();

    updateUI();
  }

  function tick(){
    remainingSeconds -= 1;
    if (remainingSeconds <= 0){
      finish();
      return;
    }
    updateUI();
  }

  function startTimer(){
    finished = false;
    displayCard.classList.remove('pulse');

    if (remainingSeconds === 0){
      remainingSeconds = totalSeconds;
    }
    if (running) return;

    running = true;
    timerId = setInterval(tick, 1000);
    updateUI();
  }

  function stopTimer(fromFinish = false){
    running = false;
    if (timerId){
      clearInterval(timerId);
      timerId = null;
    }
    if (!fromFinish){
      updateUI();
    }
  }

  function resetTimer(){
    stopTimer(false);
    finished = false;
    displayCard.classList.remove('pulse');
    remainingSeconds = totalSeconds;
    updateUI();
  }

  // --- Events ---
  minutesRange.addEventListener('input', () => {
    const m = Number(minutesRange.value);
    minutesLabel.textContent = m;

    totalSeconds = m * 60;

    if (!running){
      finished = false;
      displayCard.classList.remove('pulse');
      remainingSeconds = totalSeconds;
      updateUI();
    } else {
      remainingSeconds = clamp(remainingSeconds, 0, totalSeconds);
      updateUI();
    }
  });

  startPauseBtn.addEventListener('click', () => {
    if (running) stopTimer(false);
    else startTimer();
  });

  resetBtn.addEventListener('click', resetTimer);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space'){
      e.preventDefault();
      if (running) stopTimer(false);
      else startTimer();
    }
    if (e.key.toLowerCase() === 'r'){
      resetTimer();
    }
  });

  // Initial paint
  updateUI();
})();
</script>
</body>
</html>
